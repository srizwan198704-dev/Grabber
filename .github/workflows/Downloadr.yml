name: Dynamic Video Grab and Convert

on:
  workflow_dispatch:

jobs:
  grab_and_convert:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install playwright
        playwright install chromium
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    # [ফ্রি অটোমেটিক ভিপিএন] রানারের আইপি পরিবর্তন করার জন্য
    - name: Connect to Free VPN
      uses: amandahla/action-vpn@v3
      with:
        vpn_gateway: 'Japan' # সাইট ব্লক থাকলে এটি বদলে 'United States' বা 'Singapore' দিতে পারেন

    # ভিপিএন সঠিকভাবে কানেক্ট হয়েছে কিনা তা আইপি দেখে নিশ্চিত হওয়ার জন্য
    - name: Check Public IP
      run: curl ifconfig.me

    - name: Grab and Download Video
      run: |
        python grabber.py

    # ভিডিও কনভার্ট করার স্টেপ
    - name: Convert Video to 3GP
      run: |
        if [ -f downloaded_video.mp4 ]; then
          echo "Converting downloaded MP4..."
          ffmpeg -i downloaded_video.mp4 -r 20 -s 352x288 -vb 400k -acodec aac -strict experimental -ac 1 -ar 8000 -ab 24k output.3gp
        elif [ -f stream_link.txt ]; then
          echo "Streaming and converting from m3u8 URL..."
          M3U8_URL=$(cat stream_link.txt)
          ffmpeg -i "$M3U8_URL" -r 20 -s 352x288 -vb 400k -acodec aac -strict experimental -ac 1 -ar 8000 -ab 24k output.3gp
        else
          echo "Error: No video resource found!"
          exit 1
        fi

    # কাজ সফল হলে ফাইল ডাউনলোড করার জন্য আর্টিফ্যাক্ট আপলোড
    - name: Upload Converted 3GP
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: my-converted-3gp
        path: output.3gp

    # কোনো কারণে স্ক্রিপ্ট ফেইল করলে স্ক্রিনশট দেখার জন্য
    - name: Upload Debug Screenshot on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: debug-screenshot
        path: page_screenshot.png
