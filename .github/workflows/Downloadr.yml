name: Dynamic Video Grab and Convert

on:
  workflow_dispatch:

jobs:
  grab_and_convert:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install playwright
        playwright install chromium
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    # [অফিসিয়াল ক্লাউডফ্লেয়ার ওয়ার্প ভিপিএন সেটআপ]
    - name: Install and Connect Cloudflare WARP (VPN)
      run: |
        # ক্লাউডফ্লেয়ার জিপিজিকি এবং সোর্স লিস্ট যোগ করা
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ / base" | sudo tee /etc/apt/sources.list.cl/cloudflare-warp.list
        
        # ওয়ার্প ক্লায়েন্ট ইনস্টল করা
        sudo apt-get update && sudo apt-get install -y cloudflare-warp
        
        # ওয়ার্প রেজিস্ট্রি এবং মোড সেটআপ (Proxy মোড নয়, গ্লোবাল ভিপিএন মোড)
        warp-cli --accept-tos registration new
        warp-cli --accept-tos mode warp
        
        # ভিপিএন কানেক্ট করা
        warp-cli --accept-tos connect
        
        # ভিপিএন কানেক্ট হওয়ার জন্য ৫ সেকেন্ড অপেক্ষা
        sleep 5

    # ভিপিএন ঠিকঠাক কাজ করছে কিনা এবং আইপি পরিবর্তন হয়েছে কিনা তা চেক করা
    - name: Check Public IP & VPN Status
      run: |
        curl -s https://www.cloudflare.com/cdn-cgi/trace | grep -E "ip=|warp="
        curl ifconfig.me

    - name: Grab and Download Video
      run: |
        python grabber.py

    # ভিডিও কনভার্ট করার স্টেপ
    - name: Convert Video to 3GP
      run: |
        if [ -f downloaded_video.mp4 ]; then
          echo "Converting downloaded MP4..."
          ffmpeg -i downloaded_video.mp4 -r 20 -s 352x288 -vb 400k -acodec aac -strict experimental -ac 1 -ar 8000 -ab 24k output.3gp
        elif [ -f stream_link.txt ]; then
          echo "Streaming and converting from m3u8 URL..."
          M3U8_URL=$(cat stream_link.txt)
          ffmpeg -i "$M3U8_URL" -r 20 -s 352x288 -vb 400k -acodec aac -strict experimental -ac 1 -ar 8000 -ab 24k output.3gp
        else
          echo "Error: No video resource found!"
          exit 1
        fi

    # কাজ সফল হলে ফাইল ডাউনলোড করার জন্য আর্টিফ্যাক্ট আপলোড
    - name: Upload Converted 3GP
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: my-converted-3gp
        path: output.3gp

    # কোনো কারণে স্ক্রিপ্ট ফেইল করলে স্ক্রিনশট দেখার জন্য
    - name: Upload Debug Screenshot on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: debug-screenshot
        path: page_screenshot.png
